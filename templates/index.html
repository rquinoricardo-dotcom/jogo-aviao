<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Aviator Pro</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 10px; }
        .game-panel { background: #1a1a1a; padding: 20px; border-radius: 10px; text-align: center; height: 200px; position: relative; }
        .controls { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
        .aposta-box { background: #333; padding: 10px; border-radius: 5px; }
        #multiplicador { font-size: 50px; color: #ffcc00; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="game-panel">
    <div id="multiplicador">x1.00</div>
</div>

<!-- Controles de Aposta -->
<div class="controls">
    <div class="aposta-box">
        <input type="number" id="valor-1" value="10" style="width:60px;">
        <input type="number" id="auto-saque-1" placeholder="Auto Saque" style="width:80px;">
        <button id="btn-apostar-1">Apostar</button>
        <button id="btn-sacar-1" class="hidden">SAIR</button>
    </div>
</div>

<script>
    let mult = 1.00;
    let jogando = false;
    let autoSaqueAtivado = false;

    // Lógica para o botão de aposta
    document.getElementById('btn-apostar-1').addEventListener('click', () => {
        jogando = true;
        document.getElementById('btn-apostar-1').classList.add('hidden');
        document.getElementById('btn-sacar-1').classList.remove('hidden');
        
        let metaAutoSaque = parseFloat(document.getElementById('auto-saque-1').value);

        let intervalo = setInterval(() => {
            mult += 0.05;
            document.getElementById('multiplicador').innerText = 'x' + mult.toFixed(2);

            // Saque Automático
            if (metaAutoSaque > 0 && mult >= metaAutoSaque) {
                sacar(intervalo);
                alert("Auto Saque realizado em x" + mult.toFixed(2));
            }

            // Queda aleatória
            if (mult > (Math.random() * 8 + 1.2)) {
                clearInterval(intervalo);
                jogando = false;
                resetarBotoes();
                alert("O avião caiu!");
            }
        }, 100);
    });

    function sacar(int) {
        clearInterval(int);
        jogando = false;
        resetarBotoes();
    }

    function resetarBotoes() {
        document.getElementById('btn-apostar-1').classList.remove('hidden');
        document.getElementById('btn-sacar-1').classList.add('hidden');
        mult = 1.00;
        document.getElementById('multiplicador').innerText = 'x1.00';
    }

    document.getElementById('btn-sacar-1').addEventListener('click', () => {
        sacar();
        alert("Você sacou manualmente em x" + mult.toFixed(2));
    });
</script>
</body>
</html>

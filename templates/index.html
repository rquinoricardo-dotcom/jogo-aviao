<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Jogo do Avião</title>
    <style>
	<script>
        body {
            background: radial-gradient(circle, #1a2a3a 0%, #000000 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: #151f28;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #2d4a5e;
            margin: 20px;
        }
        #multiplicador { 
            font-size: 48px; 
            color: #00d4ff; 
            font-weight: bold; 
            margin: 20px 0;
        }
        input {
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #00d4ff;
            background: #0b131a;
            color: white;
            width: 250px;
            text-align: center;
            margin-bottom: 20px;
        }
        button {
            padding: 15px 40px;
            border-radius: 10px;
            background-color: #00d4ff;
            border: none;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Bem-vindo ao Jogo do Avião!</h1>
        <p>O multiplicador atual é:</p>
        
        <!-- Elemento para o multiplicador -->
        <div id="multiplicador"><span id="aviao">🚀</span> x1.00</div>
        
        <!-- Input de aposta -->
        <input type="number" id="valor-aposta" placeholder="Insira o valor (MZN)">
        <br>
        <!-- Botão de ação -->
        <button id="btn-jogar">Jogar Novamente</button>
    </div>
	<script>
		let saldo = 1000;

btnJogar.addEventListener('click', () => {
    let aposta = parseFloat(inputAposta.value);

    if (aposta > saldo) {
        alert("Saldo insuficiente!");
        return;
    }

    // Subtrai a aposta do saldo
    saldo -= aposta;
    saldoDisplay.innerText = saldo;

    // Simula a vitória (aqui o multiplicador subiria)
    let multiplicadorAleatorio = (Math.random() * 2 + 1).toFixed(2); // Gera um valor entre 1 e 3
    let ganho = aposta * multiplicadorAleatorio;
    
    saldo += ganho;
    saldoDisplay.innerText = saldo.toFixed(2);
    displayResultado.innerText = "Você ganhou " + ganho.toFixed(2) + " MZN no multiplicador x" + multiplicadorAleatorio;

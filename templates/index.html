<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Simulação</title>
    <style>
        body { background: #000; color: #fff; font-family: Arial; margin: 0; padding: 10px; }
        .header { display: flex; justify-content: space-between; background: #222; padding: 10px; border-radius: 5px; }
        .game-panel { background: #1a1a1a; padding: 20px; text-align: center; height: 200px; position: relative; margin-top: 10px; }
        #login-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10; padding: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<!-- Tela de Login -->
<div id="login-screen">
    <h2>Bem-vindo ao Aviator</h2>
    <input type="text" id="nome-usuario" placeholder="Seu nome">
    <button onclick="fazerLogin()">Entrar</button>
</div>

<!-- Jogo -->
<div class="header">
    <span id="display-nome">Jogador: ---</span>
    <span id="display-saldo">Saldo: 1000.00 MZN</span>
</div>

<div class="game-panel">
    <div id="multiplicador">x1.00</div>
    <input type="number" id="valor-aposta" placeholder="MZN">
    <button id="btn-apostar">Apostar</button>
    <button id="btn-sacar" class="hidden">SAIR</button>
</div>

<script>
    let saldo = parseFloat(localStorage.getItem('saldo')) || 1000.00;
    let nome = localStorage.getItem('usuario') || "";

    function fazerLogin() {
        nome = document.getElementById('nome-usuario').value;
        if(nome) {
            localStorage.setItem('usuario', nome);
            localStorage.setItem('saldo', saldo);
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('display-nome').innerText = "Jogador: " + nome;
            document.getElementById('display-saldo').innerText = "Saldo: " + saldo.toFixed(2) + " MZN";
        }
    }

    // Inicialização
    if(nome) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('display-nome').innerText = "Jogador: " + nome;
        document.getElementById('display-saldo').innerText = "Saldo: " + saldo.toFixed(2) + " MZN";
    }

    // Lógica básica de aposta para atualizar o saldo
    document.getElementById('btn-apostar').addEventListener('click', () => {
        let aposta = parseFloat(document.getElementById('valor-aposta').value);
        if(aposta > saldo) return alert("Saldo insuficiente!");
        
        saldo -= aposta;
        localStorage.setItem('saldo', saldo);
        document.getElementById('display-saldo').innerText = "Saldo: " + saldo.toFixed(2) + " MZN";
        
        // Aqui você adiciona a lógica de multiplicar e devolver o saldo...
        alert("Aposta registrada! Boa sorte.");
    });
</script>
</body>
</html>

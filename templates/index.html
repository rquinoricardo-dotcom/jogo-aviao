<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Clone</title>
    <style>
        body { background: #000; color: #fff; font-family: Arial; margin: 0; padding: 10px; }
        .main-container { display: flex; flex-direction: column; gap: 10px; }
        /* Painel do Avião */
        .game-panel { background: #222; padding: 20px; border-radius: 10px; text-align: center; }
        #multiplicador { font-size: 50px; font-weight: bold; color: #ffcc00; }
        /* Lista de Jogadores Estilo Aviator */
        .players-panel { background: #111; padding: 10px; border-radius: 10px; }
        .player-row { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 5px 0; font-size: 14px; }
        .voando { animation: spin 0.5s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="game-panel">
        <div id="multiplicador"><span id="aviao">🚀</span> <span id="valor-mult">x1.00</span></div>
        <input type="number" id="valor-aposta" placeholder="MZN" style="width: 80px;">
        <button id="btn-apostar">Apostar</button>
        <button id="btn-sacar" class="hidden">SAIR</button>
    </div>

    <div class="players-panel">
        <div class="player-row"><span>Jogador</span><span>Aposta</span><span>Status</span></div>
        <div id="lista-jogadores"></div>
    </div>
</div>

<script>
    const jogadores = [
        { nome: "J_Silva", aposta: 100 },
        { nome: "Ana_Tech", aposta: 250 },
        { nome: "Carlos_Z", aposta: 500 }
    ];

    function renderizarJogadores() {
        const lista = document.getElementById('lista-jogadores');
        lista.innerHTML = jogadores.map(j => `
            <div class="player-row">
                <span>${j.nome}</span>
                <span>${j.aposta} MZN</span>
                <span id="status-${j.nome}">Esperando</span>
            </div>
        `).join('');
    }

    renderizarJogadores();
    
    // ... O restante da lógica de jogo (setInterval, btnApostar, etc) permanece igual
    // Dica: Adicione a chamada renderizarJogadores() logo no início.
</script>
</body>
</html>

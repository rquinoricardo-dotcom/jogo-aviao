<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jogo do Avião</title>
    <style>
        .box { text-align: center; font-family: sans-serif; color: white; background: #222; padding: 20px; border-radius: 10px; }
        #multiplicador { font-size: 40px; font-weight: bold; margin: 20px 0; position: relative; }
        #aviao { font-size: 50px; display: inline-block; }
        
        /* Classe da animação */
        .voando {
            animation: voar 0.5s linear infinite;
        }
        @keyframes voar {
            0% { transform: translate(0, 0); }
            50% { transform: translate(10px, -10px); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Bem-vindo ao Jogo do Avião!</h1>
    <p>Seu Saldo: <span id="saldo">1000.00</span> MZN</p>
    
    <div id="multiplicador">
        <span id="aviao">🚀</span> <span id="valor-mult">x1.00</span>
    </div>

    <input type="number" id="valor-aposta" placeholder="Valor da aposta (MZN)">
    <br><br>
    <button id="btn-jogar">Apostar</button>
</div>

<script>
    let saldo = 1000.00;
    let jogando = false;
    let multiplicador = 1.00;

    const saldoDisplay = document.getElementById('saldo');
    const valorMultDisplay = document.getElementById('valor-mult');
    const aviao = document.getElementById('aviao');
    const inputAposta = document.getElementById('valor-aposta');
    const btnJogar = document.getElementById('btn-jogar');

    btnJogar.addEventListener('click', () => {
        if (jogando) return;

        let aposta = parseFloat(inputAposta.value);
        if (isNaN(aposta) || aposta <= 0 || aposta > saldo) {
            alert("Aposta inválida ou saldo insuficiente!");
            return;
        }

        saldo -= aposta;
        saldoDisplay.innerText = saldo.toFixed(2);
        
        jogando = true;
        multiplicador = 1.00;
        btnJogar.innerText = "Voando...";
        aviao.classList.add('voando'); // Inicia animação
        
        const intervalo = setInterval(() => {
            multiplicador += 0.05;
            valorMultDisplay.innerText = 'x' + multiplicador.toFixed(2);

            if (multiplicador > (Math.random() * 10 + 1.5)) {
                clearInterval(intervalo);
                let ganho = aposta * multiplicador;
                saldo += ganho;
                saldoDisplay.innerText = saldo.toFixed(2);
                
                aviao.classList.remove('voando'); // Para animação
                alert("O avião caiu em " + multiplicador.toFixed(2) + "! Você ganhou " + ganho.toFixed(2) + " MZN");
                
                jogando = false;
                btnJogar.innerText = "Apostar";
            }
        }, 100);
    });
</script>

</body>
</html>

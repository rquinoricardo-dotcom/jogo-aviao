<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jogo do Avião</title>
    <style>
        body {
            background: radial-gradient(circle, #1a2a3a 0%, #000000 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { text-shadow: 0 0 10px #00d4ff; }
        .box {
            background: #151f28;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #2d4a5e;
            margin: 20px;
        }
        .multiplicador { font-size: 48px; color: #00d4ff; font-weight: bold; }
        input {
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #00d4ff;
            background: #0b131a;
            color: white;
            width: 250px;
            text-align: center;
            margin-bottom: 20px;
        }
        button {
            padding: 15px 40px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(90deg, #00d4ff, #007bff);
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 18px;
        }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <h1>Bem-vindo ao Jogo do Avião!</h1>
    <p>O multiplicador atual é:</p>
    
    <div class="box">
        <div class="multiplicador">x{{ multiplicador }} ✈️</div>
    </div>

    <form method="POST">
        <input type="number" name="aposta" placeholder="Insira o valor da aposta (MZN)" required>
        <br>
        <button type="submit">Jogar Novamente</button>
    </form>
</body>
</html>

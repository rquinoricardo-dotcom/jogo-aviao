<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Jogo do Avião</title>
    <style>
	<script>
        body {
            background: radial-gradient(circle, #1a2a3a 0%, #000000 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: #151f28;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #2d4a5e;
            margin: 20px;
        }
        #multiplicador { 
            font-size: 48px; 
            color: #00d4ff; 
            font-weight: bold; 
            margin: 20px 0;
        }
        input {
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #00d4ff;
            background: #0b131a;
            color: white;
            width: 250px;
            text-align: center;
            margin-bottom: 20px;
        }
        button {
            padding: 15px 40px;
            border-radius: 10px;
            background-color: #00d4ff;
            border: none;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Bem-vindo ao Jogo do Avião!</h1>
        <p>O multiplicador atual é:</p>
        
        <!-- Elemento para o multiplicador -->
        <div id="multiplicador">x1.00</div>
        
        <!-- Input de aposta -->
        <input type="number" id="valor-aposta" placeholder="Insira o valor (MZN)">
        <br>
        <!-- Botão de ação -->
        <button id="btn-jogar">Jogar Novamente</button>
    </div>
	<script>
	    const btnJogar = document.getElementById('btn-jogar');
    const displayMultiplicador = document.getElementById('multiplicador');
    let multiplicador = 1.00;
    let jogando = false;

    btnJogar.addEventListener('click', () => {
        if (jogando) return;
        
        jogando = true;
        multiplicador = 1.00;
        btnJogar.innerText = "Voando...";
        
        const intervalo = setInterval(() => {
            multiplicador += 0.05;
            displayMultiplicador.innerText = 'x' + multiplicador.toFixed(2);
            
            // Simula o avião voando para longe aleatoriamente
            if (multiplicador > (Math.random() * 10 + 2)) {
                clearInterval(intervalo);
                jogando = false;
                displayMultiplicador.innerText = "Caiu em x" + multiplicador.toFixed(2);
                btnJogar.innerText = "Jogar Novamente";
            }
        }, 100);
    });
</script>

</body>
</html>
